<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Isabella Beauty'Skincare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="agnes-kepala-web">
        <div class="agnes-wadah-header">
            <div class="agnes-nama-aplikasi" style="display: flex; align-items: center; gap: 10px;">
                <img src="images/logo skincare.jpeg" alt="Logo Isabella Skincare" style="height: 45px; width: auto; border-radius: 50%; object-fit: cover;">
                <span style="font-weight: bold;">Isabella Beauty'Skincare ✨</span>
            </div>
            <nav class="agnes-menu-navigasi">
                <ul>
                    <li><a href="index.html" class="agnes-tombol-navigasi">Beranda</a></li>
                    <li><a href="transaksi.html" class="agnes-tombol-navigasi">Transaksi</a></li>
                    <li><a href="daftar transaksi.html" class="agnes-tombol-navigasi"> Daftar Transaksi</a></li>
                    <li><a href="profil.html" class="agnes-tombol-navigasi">Profil Aplikasi</a></li>
                    <li><a href="login.html" class="agnes-tombol-navigasi agnes-halaman-aktif">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="agnes-wadah-konten" style="display: flex; justify-content: center; align-items: center; min-height: 75vh; padding: 20px;">
        <div style="display: flex; width: 100%; max-width: 850px; background-color: #ffffff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #ffb7c5;">
            
            <div style="flex: 1; display: block; max-width: 50%;">
                <img src="produk skincare.jpeg" alt="Isabella Skincare" style="width: 100%; height: 100%; object-fit: cover; min-height: 480px;">
            </div>

            <div style="flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(135deg, #ffffff 0%, #fff5f6 100%);">
                
                <div style="border-left: 4px solid var(--pink-utama); padding-left: 15px; margin-bottom: 25px;">
                    <h2 style="margin: 0; color: #ec2467; font-size: 24px; font-weight: bold; text-align: left;">Sign In Admin</h2>
                    <p style="margin: 5px 0 0 0; font-size: 13px; color: #777; line-height: 1.4; text-align: left;">Masukkan akses akun admin toko untuk mengelola data skincare.</p>
                </div>
                
                <div id="kotakError"></div>

                <form action="index.html" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
                    <div class="agnes-grup-isian" style="display: flex; flex-direction: column; text-align: left;">
                        <label for="usernameAgnes" style="font-size: 13px; font-weight: bold; color: #555; margin-bottom: 6px;">Username</label>
                        <input type="text" id="usernameAgnes" class="agnes-kotak-input" placeholder="Ketik username admin" required style="width: 100%; padding: 12px 15px; border: 1.5px solid #ffd0d8; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
                    </div>
                    
                    <div class="agnes-grup-isian" style="display: flex; flex-direction: column; text-align: left;">
                        <label for="passwordAgnes" style="font-size: 13px; font-weight: bold; color: #555; margin-bottom: 6px;">Password</label>
                        <input type="password" id="passwordAgnes" class="agnes-kotak-input" placeholder="Ketik password admin" required style="width: 100%; padding: 12px 15px; border: 1.5px solid #ffd0d8; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
                    </div>

                    <button type="submit" class="agnes-tombol-pink" style="width: 100%; padding: 14px; border: none; border-radius: 8px; background-color: var(--pink-utama); color: #db4369; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(255, 183, 197, 0.4); margin-top: 10px;">
                        Masuk Sistem →
                    </button>
                </form>
            </div>

        </div>
    </main>

    <footer class="agnes-kaki-web">
        <p>Copyright &copy; 2026 &bull; Designed by Agnes Isabella Uku &bull; All Rights Reserved</p>
    </footer>

</body>
</html>
